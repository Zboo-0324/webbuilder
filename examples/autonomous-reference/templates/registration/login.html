<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Autonomous Reference</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <main>
        <h1>Sign in</h1>
        {% if form.errors %}
        <p class="error" role="alert">Invalid username or password.</p>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" required>
            </div>
            <button type="submit">Sign in</button>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
        </form>
    </main>
</body>
</html>
